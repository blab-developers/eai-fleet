workflow:
  auto_cancel:
    on_new_commit: interruptible

stages:
  - validate
  - build
  - deploy

variables:
  REGISTRY: "registry.endoscopeai.com"
  GIT_SSL_CAINFO: "$CI_SERVER_TLS_CA_FILE"
  DOCKER_HOST: tcp://localhost:2375
  DOCKER_TLS_CERTDIR: ""
  # eai_core is published to no pip index; it ships as the apps/backend/eai-core
  # submodule. Init it on every checkout so the validate jobs can pip-install it
  # and the build job's Docker context (apps/backend) carries its source.
  GIT_SUBMODULE_STRATEGY: normal
  GIT_SUBMODULE_PATHS: apps/backend/eai-core

.dind-service: &dind-service
  name: docker:24-dind
  # Trust the corporate CA inside DinD before dockerd starts; otherwise
  # `node:20-alpine` / `python:3.12-slim` pulls fail with
  # x509 unknown-authority on Ochsner's MITM proxy. Same shape eai-catalog uses.
  entrypoint:
    - sh
    - -c
    - 'update-ca-certificates 2>/dev/null; exec dockerd-entrypoint.sh --insecure-registry=registry.default.svc.cluster.local:5000'

.ca-script: &ca-script |
  if [ -n "${CORPORATE_CA_CERT:-}" ]; then
    cp "$CORPORATE_CA_CERT" /usr/local/share/ca-certificates/corporate.crt 2>/dev/null || true
    git config --global http.sslCAInfo "$CORPORATE_CA_CERT" 2>/dev/null || true
    export NODE_EXTRA_CA_CERTS="$CORPORATE_CA_CERT"
  fi
  update-ca-certificates 2>/dev/null || true

.docker-build-before: &docker-build-before
  - *ca-script
  - sed -i 's|https://|http://|g' /etc/apk/repositories
  - apk add --no-cache make bash
  - until docker info >/dev/null 2>&1; do sleep 1; done

.validate-rules: &validate-rules
  - if: $CI_COMMIT_BRANCH == "main"
  - if: $CI_PIPELINE_SOURCE == "merge_request_event"

default:
  before_script:
    - *ca-script

# ---------- Validate ----------

lint:backend:
  stage: validate
  image: python:3.12-slim
  interruptible: true
  variables:
    PIP_CACHE_DIR: "$CI_PROJECT_DIR/.pip-cache"
  cache:
    key: pip-lint-py312
    paths:
      - .pip-cache/
  before_script:
    - *ca-script
    # python:3.12-slim doesn't ship `make` (needed by the ci-* targets) or
    # libatomic1 (needed by pyright's bundled node binary).
    - apt-get update && apt-get install -y --no-install-recommends make libatomic1
    # eai_core first (vendored submodule) so the app's eai_core requirement resolves.
    - pip install -e apps/backend/eai-core
    - pip install -e "apps/backend[dev]"
  script:
    - make ci-lint-backend
  rules: *validate-rules

test:backend:
  stage: validate
  image: python:3.12-slim
  interruptible: true
  variables:
    PIP_CACHE_DIR: "$CI_PROJECT_DIR/.pip-cache"
  cache:
    key: pip-test-py312
    paths:
      - .pip-cache/
  before_script:
    - *ca-script
    - apt-get update && apt-get install -y --no-install-recommends make
    # eai_core first (vendored submodule) so the app's eai_core requirement resolves.
    - pip install -e apps/backend/eai-core
    - pip install -e "apps/backend[dev]"
  script:
    - make ci-test-backend
  rules: *validate-rules

frontend:
  stage: validate
  # Official Playwright image: Chromium is pre-installed, so there's no CDN
  # download to trip over the corporate-MITM self-signed cert (the pattern
  # eai-audit uses). Ubuntu 24.04 ships Python 3.12 (eai_core needs >=3.12 for
  # its PEP 695 syntax) and Node 24 satisfies vite's >=22.12. The tag must track
  # @playwright/test (^1.60) so the baked-in browser matches the test runner.
  image: mcr.microsoft.com/playwright:v1.60.0-noble
  interruptible: true
  variables:
    YARN_CACHE_FOLDER: "$CI_PROJECT_DIR/.yarn-cache"
    PIP_CACHE_DIR: "$CI_PROJECT_DIR/.pip-cache"
  cache:
    key: frontend-playwright-v1.60
    paths:
      - .yarn-cache/
      - .pip-cache/
  before_script:
    - *ca-script
    - apt-get update && apt-get install -y --no-install-recommends make python3-pip python3-venv
    # gen:api boots the backend's app.openapi(), which imports eai_core; install
    # the vendored eai_core first so the app's requirement resolves. The image's
    # system python3 is 3.12, so gen-backend-api.mjs's python3 fallback works.
    - pip install --break-system-packages -e apps/backend/eai-core
    - pip install --break-system-packages -e "apps/backend"
    - corepack enable
    # No `playwright install` — Chromium is baked into the image.
    - cd apps/frontend && yarn install --immutable && cd ../..
  script:
    - make ci-lint-frontend
    - make ci-gen-types-check
    - make ci-test-frontend
  rules: *validate-rules

# ---------- Build ----------
# `make push` builds + pushes BOTH images (eai-fleet-backend + eai-fleet-frontend).

build:
  stage: build
  image: docker:24
  interruptible: true
  needs:
    - job: lint:backend
    - job: test:backend
    - job: frontend
  services:
    - *dind-service
  before_script: *docker-build-before
  script:
    - make push GIT_SHA=$CI_COMMIT_SHA REGISTRY=$REGISTRY
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# ---------- Deploy ----------
# Shell runner on the host. eai-infra owns ansible + vault.

deploy:
  stage: deploy
  tags: [deploy]
  variables:
    DOCKER_HOST: unix:///var/run/docker.sock
  script:
    # Pull latest eai-infra first: this job uses a fixed checkout on the runner
    # and never updated it, so a stale checkout could deploy old infra logic
    # (e.g. missing the legacy-container removal task → "port already allocated").
    - cd /usr/local/eai/workspace/eai-infra && git fetch && git checkout main && git pull --ff-only
    - make deploy-fleet-prod
    - docker image prune -f
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  environment:
    name: production
    url: https://fleet.endoscopeai.com/
