# Root linter configuration for eai-fleet.
# Backend deps live in apps/backend/pyproject.toml; this file only sets shared
# tool config so lint rules are consistent across the repository.

[tool.pyright]
pythonVersion = "3.12"
typeCheckingMode = "strict"
# No venvPath here: the backend venv lives at apps/backend/.venv (pyright runs from
# there), and CI installs into the system Python — so let pyright use the active
# interpreter. A root venvPath="." pointed at a non-existent ./.venv and only warned.

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
